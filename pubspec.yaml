name: venue_vantage
description: "VenueVantage – Smart Venue Experience for Large-Scale Sports Events"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  shared_preferences: ^2.3.4

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Utils
  intl: ^0.20.2
  google_generative_ai: ^0.4.5

  # HTTP (REST fallback)
  http: ^1.2.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#0A0E1A"

flutter_native_splash:
  color: "#0A0E1A"
  image: assets/images/app_icon.png
  color_dark: "#0A0E1A"
  image_dark: assets/images/app_icon.png
  android_12:
    color: "#0A0E1A"
    image: assets/images/app_icon.png
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
