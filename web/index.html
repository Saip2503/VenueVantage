<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-Compatible">
  <meta name="description" content="VenueVantage – Your smart stadium companion for crowd wayfinding, in-seat ordering, and live event alerts.">
  <meta name="theme-color" content="#0F131F">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VenueVantage">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>VenueVantage</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Google Sign-In (GIS) library — required for google_sign_in_web.
    The Firebase JS SDK handles auth via popup; no API key needed here.
  -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC82lUuxpXEsc8DPBqtt0Nb0BwNN6uyiaQ" async defer></script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
